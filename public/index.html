<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo / Duo Ranked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/board.css" />
  <link rel="stylesheet" href="css/detail.css" />
  <link rel="stylesheet" href="css/compare.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/tooltips.css" />
  <link rel="stylesheet" href="css/clash.css" />
  <link rel="stylesheet" href="css/fetch-dashboard.css" />
</head>
<body>
  <div class="bg-glow"></div>
  <div class="wrap">
    <header>
      <div class="header-left">
        <h1>Solo / Duo Ranked <span class="h1-timer" id="refreshTimer"></span></h1>
        <p>Solo / Duo Ranked · EUNE</p>
      </div>
      <div class="header-right">
        <button id="fd-header-btn" class="fetch-dash-btn" onclick="openFetchDashboard()">📊 <span>Fetch</span></button>
        <button class="clash-btn" onclick="openClashModal()">⚔️ <span>Clash Builder</span></button>
      </div>
    </header>

    <div class="board-filter-bar">
      <div class="bf-seasons" id="board-seasons"></div>
      <div class="bf-modes" id="board-modes"></div>
    </div>

    <div class="lb-header">
      <div>#</div>
      <div>Player</div>
      <div>Rank</div>
      <div>Record</div>
      <div>Win Rate</div>
      <div style="text-align:center">Games</div>
      <div></div>
    </div>

    <div id="board"></div>
    <p class="last-updated" id="lastUpdated"></p>
  </div>

  <!-- Fetch Dashboard Modal -->
  <div id="fd-modal" class="fd-modal hidden">
    <div class="fd-backdrop" onclick="closeFetchDashboard()"></div>
    <div class="fd-panel">
      <div class="fd-header">
        <div>
          <div class="fd-title">📊 Fetch Dashboard</div>
          <div class="fd-sub">Download and store match history by season and game mode</div>
        </div>
        <button class="fd-close" onclick="closeFetchDashboard()">✕</button>
      </div>
      <div class="fd-body">
        <div>
          <div class="fd-label">Season</div>
          <div class="fd-season-row" id="fd-seasons"></div>
        </div>
        <div>
          <div class="fd-label">Game Mode</div>
          <div class="fd-mode-row" id="fd-modes"></div>
        </div>
        <div>
          <div class="fd-player-header">
            <div class="fd-label" style="margin-bottom:0">Players</div>
            <div class="fd-sel-btns">
              <button class="fd-sel-btn" onclick="_fdSelectAll(true)">All</button>
              <button class="fd-sel-btn" onclick="_fdSelectAll(false)">None</button>
            </div>
          </div>
          <div class="fd-players" id="fd-players"></div>
        </div>
        <div class="fd-actions">
          <button class="fd-start-btn" id="fd-start-btn" onclick="_fdStart()" disabled>▶ Select Players to Fetch</button>
          <button class="fd-stop-btn" id="fd-stop-btn" onclick="_fdStop()" style="display:none">⏹ Stop</button>
          <span class="fd-status-txt" id="fd-status-txt"></span>
        </div>
        <div class="fd-log-wrap">
          <div class="fd-log-header">Live Log</div>
          <div class="fd-log" id="fd-log"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Clash Builder Modal -->
  <div id="clash-modal" class="clash-modal hidden">
    <div class="clash-backdrop" onclick="closeClashModal()"></div>
    <div class="clash-panel">
      <div class="clash-panel-header">
        <div>
          <div class="clash-panel-title">⚔️ Clash Team Builder</div>
          <div class="clash-panel-sub">Optimal role assignments based on match history &amp; rank</div>
        </div>
        <button class="clash-close" onclick="closeClashModal()">✕</button>
      </div>
      <div class="clash-body">
        <div id="clash-content"></div>
      </div>
    </div>
  </div>

  <div id="compare-modal" class="compare-modal hidden">
    <div class="compare-backdrop" onclick="closeCompareModal()"></div>
    <div class="compare-panel">
      <div id="compare-content"></div>
    </div>
  </div>

<script src="js/utils.js"></script>
<script src="js/detail.js"></script>
<script src="js/board.js"></script>
<script src="js/fetch-dashboard.js"></script>
<script src="js/compare.js"></script>
<script src="js/tooltips.js"></script>
<script src="js/clash.js"></script>
<script src="js/schedule.js"></script>
</body>
</html>
