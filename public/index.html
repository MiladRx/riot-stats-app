<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo / Duo Ranked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>
  <div class="wrap">
    <header>
      <div class="header-left">
        <h1>Solo / Duo Ranked <span class="h1-timer" id="refreshTimer"></span></h1>
        <p>Solo / Duo Ranked · EUNE</p>
      </div>
      <div class="header-right">
       <!-- <button class="history-btn" id="historyBtn" onclick="openFetchPanel()">📊</button> -->
      </div>
    </header>

    <div class="lb-header">
      <div>#</div>
      <div>Player</div>
      <div>Rank</div>
      <div>Record</div>
      <div>Win Rate</div>
      <div style="text-align:center">Games</div>
      <div></div>
    </div>

    <div id="board"></div>
    <p class="last-updated" id="lastUpdated"></p>
  </div>

  <div id="fetch-panel" class="fetch-panel hidden">
    <div class="fetch-backdrop" onclick="closeFetchPanel()"></div>
    <div class="fetch-modal">
      <div class="fetch-modal-header">
        <div>
          <div class="fetch-modal-title">📊 Match History Fetch</div>
          <div class="fetch-modal-sub">Stores every ranked game for all players. Runs in the background — safe to close this panel.</div>
        </div>
      </div>
      <div class="fetch-actions">
        <button class="fetch-start-btn" id="fetchStartBtn" onclick="startFetch()">▶ Start Deep Fetch</button>
        <button class="fetch-stop-btn" id="fetchStopBtn" onclick="stopFetch()" style="display:none">⏹ Stop</button>
        <span class="fetch-status-label" id="fetchStatusLabel"></span>
      </div>
      <div class="fetch-progress-list" id="fetchProgressList"></div>
      <div class="fetch-log-wrap">
        <div class="fetch-log-title">Live Log</div>
        <div class="fetch-log" id="fetchLog"></div>
      </div>
    </div>
  </div>

  <div id="compare-modal" class="compare-modal hidden">
    <div class="compare-backdrop" onclick="closeCompareModal()"></div>
    <div class="compare-panel">
      <div id="compare-content"></div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
