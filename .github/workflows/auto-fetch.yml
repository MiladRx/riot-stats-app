name: Full Cycle Trigger

on:
  schedule:
    # Every 5 minutes — matches AUTO_FETCH_INTERVAL in config
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  full-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger full cycle
        run: |
          curl -X POST https://riot-stat-app-milad.vercel.app/full-cycle \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --retry 2

      - name: Log success
        run: echo "✅ Full cycle triggered"
